services:
  - type: web
    name: zero-click-ai
    runtime: docker
    dockerfilePath: ./Dockerfile
    disk:
      name: zero-click-data
      mountPath: /app/render-data
      sizeGB: 1
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: GROQ_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: DATABASE_URL
        value: /app/render-data/scheduler.db
      - key: USER_DB_PATH
        value: /app/render-data/users.db
