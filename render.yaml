services:
  - type: web
    name: zero-click-ai
    runtime: python
    pythonVersion: "3.11.9"
    buildCommand: >-
      pip install --upgrade pip &&
      pip install --only-binary=:all: numpy==1.26.4 scipy==1.13.1 pandas==2.2.3 scikit-learn==1.5.2 &&
      pip install -r requirements-deploy.txt &&
      python -m spacy download en_core_web_sm
    startCommand: uvicorn api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: GROQ_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
